<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A guided practice — Stuck Not Broken</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

:root{
  --bone:#F4F1E8;--bone-deep:#E6E1D6;--hairline:#D8D2C2;--ink:#1A1F2A;--ink-80:#3A3F4A;--muted:#5E5A4E;--link:#0645AD;
  --leaf:#5BA070;--amber:#D29A4A;--sky:#5891C5;
  --btn-hover:#2A3040;--rbtn:10px;--rcard:14px;
  --ease:cubic-bezier(.2,.6,.2,1);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bone);color:var(--ink);
  font-size:17px;line-height:1.65;-webkit-font-smoothing:antialiased;
  height:100dvh;overflow-y:auto;
}
.page{width:100%;max-width:680px;margin:0 auto;min-height:100dvh;padding:clamp(16px,3vh,30px) 28px;display:flex;flex-direction:column}

/* brand bar */
.brand{display:flex;align-items:center;gap:11px;margin:0 0 clamp(18px,4.2vh,40px);flex:none}
.brand img{height:22px;width:auto;display:block;opacity:.92}
.brand .mark{height:22px;width:auto;display:block}
.mark path{fill:var(--ink)}
.mark.mark-sky .g-heart{fill:var(--sky)}
.mark.mark-amber .g-bolt,.mark.mark-amber .g-x{fill:var(--amber)}
.brand-url{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);padding-left:11px;border-left:1px solid var(--hairline)}
.eyebrow{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.16em;color:var(--muted)}

/* type */
.head{display:flex;flex-direction:column;gap:10px}
.head .eyebrow{margin:0}
h1{font-weight:500;font-size:clamp(26px,4.2vw,36px);line-height:1.14;letter-spacing:-.01em;margin:0;text-wrap:pretty}
.lede{font-size:clamp(16px,1.1vw+13px,19px);line-height:1.5;color:var(--ink-80);margin:0;max-width:34em;text-wrap:pretty}
.screen{display:flex;flex-direction:column;flex:1;min-height:0}
#setup{justify-content:flex-start;gap:clamp(12px,2.4vh,22px)}
.hidden{display:none !important}

/* practice tabs */
.tabs{display:flex;gap:8px;flex-wrap:wrap}
.tab{font:inherit;font-size:14px;cursor:pointer;background:transparent;color:var(--ink-80);border:1px solid var(--hairline);border-radius:8px;padding:8px 14px;display:inline-flex;align-items:center;gap:9px;transition:border-color var(--ease) .2s,color var(--ease) .2s,background var(--ease) .2s}
.tab:hover{color:var(--ink)}
/* track color rides on the tab whether or not it's the current one */
.tab.track-sky{border-color:var(--sky)}
.tab.track-amber{border-color:var(--amber)}
/* inactive tabs keep the color but fade the outline */
.tab:not(.on).track-sky{border-color:rgba(88,145,197,.4)}
.tab:not(.on).track-amber{border-color:rgba(210,154,74,.45)}
/* the current tab is signified by a thicker, full-strength outline + bold */
.tab.on{border-width:2px;padding:7px 13px;color:var(--ink);font-weight:500}
.tab.is-opt{color:var(--muted)}
.tab.is-opt.on{color:var(--ink)}
.tab:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.tab.add{color:var(--muted);border-style:dashed;font-weight:500}
.tab.add:hover{color:var(--ink);border-color:var(--ink-80)}
.tab .x{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;margin-right:-4px;border-radius:50%;color:var(--muted);font-size:15px;line-height:1}
.tab .x:hover{color:var(--ink);background:var(--bone-deep)}

/* how-far options */
.block{margin:0}
.block .eyebrow{display:block;margin-bottom:12px}
.choices{display:flex;flex-direction:column;gap:9px}
.opt{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  font:inherit;color:inherit;cursor:pointer;
  background:transparent;border:1px solid var(--hairline);border-radius:var(--rcard);
  padding:15px 18px;transition:border-color var(--ease) .2s,background var(--ease) .2s;
}
.opt:hover{border-color:var(--ink-80)}
.opt.on{border-color:var(--ink);border-width:1.5px;padding:14.5px 17.5px}
.opt.track-sky.on{border-color:var(--sky)}
.opt.track-amber.on{border-color:var(--amber)}
.opt:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.opt .t{display:block;font-size:17px;font-weight:400;transition:font-weight var(--ease) .2s}
.opt.on .t{font-weight:500}
.opt .d{display:block;font-size:14.5px;color:var(--muted);line-height:1.45;margin-top:2px;text-wrap:pretty}

/* summary + begin */
.summary{font-size:16px;color:var(--ink-80);margin:0;min-height:1.5em;text-wrap:pretty}
.summary b{font-weight:500;color:var(--ink)}
.btn{
  font:inherit;font-weight:500;white-space:nowrap;cursor:pointer;
  background:var(--ink);color:var(--bone);border:1px solid var(--ink);
  border-radius:var(--rbtn);padding:13px 30px;transition:background var(--ease) .2s,border-color var(--ease) .2s;
}
.btn:hover{background:var(--btn-hover);border-color:var(--btn-hover)}
.btn:focus-visible{outline:2px solid var(--ink);outline-offset:3px}
.btn.primary{width:100%;padding:17px 30px;font-size:17px;border-radius:12px}
.btn.quiet{background:transparent;color:var(--ink);border:1px solid var(--ink)}
.btn.quiet:hover{background:var(--bone-deep);border-color:var(--ink)}
.hairline-removed{}
body.playing .brand{display:none}


/* adjust (progressive disclosure) — app-style settings row, not a link */
.adjust{margin:0;border-top:1px solid var(--hairline);padding-top:clamp(12px,2vh,20px)}
.adjust summary{font-size:15px;color:var(--muted);cursor:pointer;list-style:none;display:inline-flex;align-items:center;gap:9px;width:auto;transition:color var(--ease) .2s}
.adjust summary:hover{color:var(--ink)}
.adjust summary::-webkit-details-marker{display:none}
.adjust summary .tw{width:8px;height:8px;border-right:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(45deg);transition:transform var(--ease) .2s;margin-bottom:2px}
.adjust[open] summary .tw{transform:rotate(-135deg);margin-bottom:-3px}
.adjust[open] summary{margin-bottom:26px}
.adjust summary:focus-visible{outline:2px solid var(--ink);outline-offset:3px;border-radius:4px}
.adjust-body{display:flex;flex-direction:column;gap:26px}
.chips{display:flex;flex-wrap:wrap;gap:9px}
.chip{
  font:inherit;font-size:15px;cursor:pointer;text-transform:capitalize;white-space:nowrap;
  background:transparent;color:var(--muted);border:1px solid var(--hairline);
  border-radius:999px;padding:8px 16px;transition:all var(--ease) .2s;
}
.chip:hover{border-color:var(--ink-80);color:var(--ink-80)}
.chip.on{border-color:var(--ink);color:var(--ink);font-weight:500}
.chip:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
.queued{font-size:15px;color:var(--muted);margin:12px 0 0}
.queued a{color:var(--link);cursor:pointer}

/* ───── player ───── */
#player{align-items:center;justify-content:center;text-align:center}
.player-top{width:100%;display:flex;justify-content:flex-start}
.backlink{font:inherit;font-size:15px;color:var(--muted);background:none;border:0;cursor:pointer;padding:0}
.backlink:hover{color:var(--ink)}
.ringwrap{flex:1;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;padding:8px 0}
#ring{width:min(80vw,340px);height:min(80vw,340px);max-height:46vh;display:block}
.status{font-size:13px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);min-height:1.4em;transition:opacity .6s var(--ease);margin:0 0 6px}
.cue{font-size:15px;color:var(--muted);margin:0 0 20px;max-width:30em}
.cue:empty{display:none}
.gate{
  max-width:32em;margin:0 auto 20px;padding:14px 18px 14px 16px;
  border-left:2px solid var(--amber);font-size:15px;line-height:1.55;color:var(--ink-80);
  text-align:left;display:none;text-wrap:pretty;
}
.controls{display:flex;gap:12px;justify-content:center;margin-bottom:14px}
.subcontrols{display:flex;gap:10px;align-items:center;justify-content:center;margin-bottom:18px}
.btn.sm{padding:7px 14px;font-size:14px;border-radius:8px}
.silnow{font-size:13px;color:var(--muted);min-width:7.5em;text-align:center;font-variant-numeric:tabular-nums}
#progwrap{width:min(80vw,340px)}
#ptrack{height:3px;background:var(--hairline);border-radius:3px;overflow:hidden}
#pfill{height:100%;width:0;background:var(--ink);opacity:.5;transition:width .2s linear}

/* TEST-ONLY: sequence preview panel */
.testlist{margin-top:18px;width:min(92vw,440px);max-height:30vh;overflow-y:auto;text-align:left;
  font-size:12px;line-height:1.45;border:1px solid var(--hairline);border-radius:10px;padding:8px 10px;background:rgba(26,31,42,.025)}
.testlist .hd{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:6px}
.testlist .plan{font-size:12px;color:var(--ink-80);margin-bottom:8px;padding-bottom:7px;border-bottom:1px dashed var(--hairline)}
.testlist .row{display:flex;gap:8px;padding:2px 6px;border-radius:5px;color:var(--muted);font-variant-numeric:tabular-nums}
.testlist .row .n{opacity:.5;min-width:1.7em;text-align:right}
.testlist .row .ph{margin-left:auto;opacity:.65;font-style:italic;padding-left:10px}
.testlist .row.done{opacity:.4}
.testlist .row.cur{background:var(--ink);color:var(--bone);font-weight:600}
.testlist .row.cur .n,.testlist .row.cur .ph{opacity:.85}

@media (max-width:520px){
  .page{padding:20px 20px}
  .begin-row{gap:12px}
}
/* short viewports (landscape laptops): compress so the setup fits one screen */
@media (max-height:680px){
  #setup{gap:clamp(9px,1.7vh,16px)}
  .opt{padding:11px 16px}
  .opt.on{padding:10.5px 15.5px}
  .opt .d{font-size:13.5px;line-height:1.4}
}
@media (max-height:560px){
  .page{padding:12px 28px}
  .brand{margin-bottom:8px}
  h1{font-size:clamp(22px,3.4vw,28px)}
  .lede,.opt .d{display:none}
  .block .eyebrow{margin-bottom:6px}
  #setup{gap:10px}
  .opt{padding:9px 16px}
  .opt.on{padding:8.5px 15.5px}
  .choices{gap:6px}
  .btn{padding:10px 26px}
  .credit{margin-top:10px;font-size:12px}
}
</style>
</head>

  <!-- ───────────── SETUP ───────────── -->
  <main id="setup" class="screen">
    <div class="tabs" id="tabs"></div>
    <div class="block">
      <div class="choices" id="exps"></div>
    </div>
    <div class="block" id="sensewrap">
      <span class="eyebrow">anchor your attention with</span>
      <div class="chips" id="senses"></div>

function build(c){
  const raw=[],ph=[]; const add=(b,p)=>{if(has(b)){raw.push(b);ph.push(p);}};
  let loopBase=null;
  add('INTRO-01','opening');
  if(c.mind){
    add('MIND-01','arriving');add('MIND-02','the breath');loopBase='MIND-02';
    add('MIND-03','sound');add('MIND-04','the breath');add('MIND-05','touch');
    add('MIND-06','sight');add('MIND-07','an emotion');add('MIND-08','an invitation');
  }else{
    const defense=(c.key==='most'), skill=c.skill;
    const usesInvite=defense&&skill!=='obstacles';     // obstacles & anchoring skip intent-set / invite
    if(usesInvite)add('INTENT-SET','setting an intention');
    add(defense?({imagery:'PINTRO-IMAGERY',obstacles:'PINTRO-OBSTACLES',balancing:'PINTRO-BALANCING'}[skill]||'PINTRO-PENDULATING'):'PINTRO-ANCHORING','settling in');
    add('MIND-01','arriving');
    loopBase=anchorBlock(c,add);                        // anchor into safety (all non-mind practices)
    if(defense){
      add('CURIOSITY-01','staying curious');             // interest gate
      add('CAP-GATE','going further');                   // capacity gate — AFTER safety, BEFORE any defense
      if(usesInvite){
        loopBase='INVITE-01';                            // open-ended loop returns here
        add('INVITE-01','inviting what is hard');add('INVITE-02','it makes sense');add('INVITE-03','letting it be');
        add('INVITE-04','its intensity');add('INVITE-05','where it lives');add('INVITE-06','more specifically');
        add('NUMB-OK','permission');
        if(c.descDefense)add('DESC-DEFENSE','describing the defense');   // optional, under 'more options'
      }
      if(skill==='balancing'){
        add('PEND-SAFETY','back to safety');add('PEND-SAFETY-Q','noticing safety');
        add('HOLD-WATCH','holding both');add('PEND-SAFETY','back to safety');
      }else if(skill==='imagery'){
        ['IMG-01','IMG-02','IMG-03','IMG-04','IMG-05','IMG-06'].forEach(b=>add(b,'giving it an image'));
        add('PEND-SAFETY','back to safety');
      }else if(skill==='obstacles'){
        loopBase='OBST-01';
        add('OBST-01','what gets in the way');add('MIND-09-CAPCHECK','a capacity check');
        add('OBSTACLE-STATEMENTS','steadying words');
        add('OBST-02','validate it');add('OBST-03','normalize it');add('OBST-04','give it an image');add('OBST-05','invite it');
        add('PEND-SAFETY','back to safety');
      }else{ // pendulation
        add('PEND-SAFETY','back to safety');add('PEND-SAFETY-Q','noticing safety');
        add('PEND-DEFENSE','toward the harder side');add('PEND-DEFENSE-Q','noticing it');add('PEND-SAFE-REMIND','you are safe');
        add('PEND-TO-SAFETY-BRIEF','letting it come and go');add('PEND-TO-DEFENSE-BRIEF','letting it come and go');add('PEND-TO-SAFETY-BRIEF','letting it come and go');
        add('PEND-SAFETY','back to safety');
      }
      if(c.open)add('LOOP-GATE','staying or closing');    // open-ended: loops back to loopBase (INVITE-01 / OBST-01)
    }
  }
  ['CLOSE-01','CLOSE-02','CLOSE-03','CLOSE-04','CLOSE-05'].forEach(b=>add(b,'closing'));
  add('OUTRO','closing');
  return {seq:raw,phase:ph,loopBase};
}
const CLOSES=['CLOSE-01','CLOSE-02','CLOSE-03','CLOSE-04','CLOSE-05','OUTRO'];
function buildPlan(){
  const all=practices.filter(Boolean); let seq=[],phase=[],loop=false,loopFrom=0;
  all.forEach((c,ci)=>{let b=build(c),s=b.seq.slice(),p=b.phase.slice();
    const isLast=ci===all.length-1;
    const rm=x=>{const k=s.indexOf(x);if(k>=0){s.splice(k,1);p.splice(k,1);}};
    if(ci>0)rm('INTRO-01');                                  // only the first practice opens with the welcome
    if(isLast&&c.open){CLOSES.forEach(rm);}                  // open-ended: drop close+outro, loop instead
    else if(!isLast){rm('OUTRO');}                           // stacked: keep the close, drop the sign-off until the end
    if(isLast&&c.open&&b.loopBase){const li=s.indexOf(b.loopBase);loop=true;loopFrom=seq.length+(li>=0?li:0);}
    s.forEach((b2,i)=>{seq.push(b2);phase.push(p[i]);});
  });
  return {seq,phase,loop,loopFrom};
}
function estimate(o){let t=0;o.seq.forEach((b,i)=>{t+=(DUR[b]||4);if(i<o.seq.length-1)t+=gapAfter(b);});return Math.max(1,Math.round(t/60));}

/* ====== setup screen ====== */
function renderSetup(){
  cfg=practices[active];
  // tint the brand mark to the current tab's track
  const mk=document.querySelector('.mark');
  if(mk){mk.classList.remove('mark-sky','mark-amber');mk.classList.add('mark-'+TRACK[cfg.key]);}
  // practice tabs
  const TABNAME=['Your practice','Second (optional)','Third (optional)'];
  const tw=$('tabs');tw.innerHTML='';
  practices.forEach((p,i)=>{
    const b=document.createElement('button');b.type='button';
    b.className='tab'+(i===active?' on':'')+(i>0?' is-opt':'')+' track-'+TRACK[p.key];
    b.setAttribute('aria-pressed',i===active?'true':'false');
    const lab=document.createElement('span');lab.textContent=TABNAME[i];
    b.appendChild(lab);
    if(i>0){
      const x=document.createElement('span');x.className='x';x.textContent='×';
      x.setAttribute('role','button');x.setAttribute('aria-label','remove this optional practice');
      x.onclick=e=>{e.stopPropagation();practices.splice(i,1);if(active>=practices.length)active=practices.length-1;renderSetup();};
      b.appendChild(x);
    }
    b.onclick=()=>{active=i;renderSetup();};
    tw.appendChild(b);
  });
  if(practices.length<3){
    const a=document.createElement('button');a.type='button';a.className='tab add';
    a.textContent='+ add another';
    a.onclick=()=>{practices.push(fresh('mindfulness'));active=practices.length-1;renderSetup();};
    tw.appendChild(a);
  }
  // experience options
  const ew=$('exps');ew.innerHTML='';
  Object.values(EXP).forEach(e=>{
    const b=document.createElement('button');b.type='button';
    b.className='opt'+(e.key===cfg.key?' on':'')+' track-'+TRACK[e.key];
    b.setAttribute('role','radio');b.setAttribute('aria-checked',e.key===cfg.key?'true':'false');
    b.innerHTML='<span class="t">'+e.t+'</span>';
    b.onclick=()=>{practices[active]=fresh(e.key);renderSetup();};
    ew.appendChild(b);
  });
  // anchor sense (only when the practice uses a chosen sense)
  $('sensewrap').style.display=cfg.mind?'none':'block';
  if(!cfg.mind){const sw=$('senses');sw.innerHTML='';
    allSenses.forEach(s=>{const p=chip(s,s===cfg.sense);p.onclick=()=>{cfg.sense=s;renderSetup();};sw.appendChild(p);});}
  // skill menu (the deeper practices)
  const sk=SKILLS[cfg.key];
  $('skillwrap').style.display=sk?'block':'none';
  if(sk){const kw=$('skills');kw.innerHTML='';
    sk.forEach(([v,lbl])=>{const p=chip(lbl,v===cfg.skill);p.onclick=()=>{cfg.skill=v;renderSetup();};kw.appendChild(p);});}
  // describe-the-defense toggle — only for invite-based defense skills
  const showDD=cfg.key==='most'&&['imagery','balancing','pendulation'].indexOf(cfg.skill)>=0;
  $('descdefwrap').style.display=showDD?'block':'none';
  if(showDD){const dw=$('descdefs');dw.innerHTML='';
    [[true,'describe it'],[false,'skip it']].forEach(([v,lbl])=>{const p=chip(lbl,v===!!cfg.descDefense);p.onclick=()=>{cfg.descDefense=v;renderSetup();};dw.appendChild(p);});}
  // silence
  const sv=$('sils');sv.innerHTML='';
  SIL.forEach(([v,lbl])=>{const p=chip(lbl,v===cfg.silence);p.onclick=()=>{cfg.silence=v;renderSetup();};sv.appendChild(p);});
  // length — only meaningful for the final practice
  const isLast=active===practices.length-1;
  $('lenwrap').style.display=isLast?'block':'none';
  if(isLast){const lw=$('lens');lw.innerHTML='';
    [[false,'a complete practice'],[true,'open-ended']].forEach(([v,lbl])=>{const p=chip(lbl,v===cfg.open);p.onclick=()=>{cfg.open=v;renderSetup();};lw.appendChild(p);});}
  // summary
  const o=buildPlan();
  const time = o.loop ? '<b>Open-ended.</b> It stays open until you end it.' : '<b>About '+estimate(o)+' min.</b>';
  const pre = practices.length>1 ? (['','','Two','Three'][practices.length]+' practices, back to back. ') : '';
  $('summary').innerHTML = pre + time;
}
function chip(label,on){
  const b=document.createElement('button');b.type='button';
  b.className='chip'+(on?' on':'');b.setAttribute('aria-pressed',on?'true':'false');
  b.textContent=label;return b;
}
$('adjust').addEventListener('toggle',()=>{
  renderSetup();
});

/* ====== player — advance on the audio's REAL end, not a duration table ======
   This removes the cutoffs (final clip was hard-paused at DUR) and the smudges
   (a clip whose take ran longer than DUR bled into the silence). DUR is no longer
   used to advance; we wait for `ended`, then hold the silence gap, then play next. */
let SEQ=[],PH=[],idx=-1,LOOP=false,LOOPFROM=0;
let playing=false,paused=false,finished=false;
let gapTimer=null,inGap=false,gapRemain=0,gapStart=0;

function showScreen(id){['setup','player'].forEach(s=>$(s).classList.toggle('hidden',s!==id));document.body.classList.toggle('playing',id==='player');}

/* TEST-ONLY: live sequence preview so you can see what's coming. Remove for production. */
function renderTest(){
  const tl=$('testlist');if(!tl)return;
  const plan=practices.map((p,i)=>{
    let s=({mindfulness:'mindfulness',anchoring:'connect w/ safety',most:'self-regulation'})[p.key]||p.key;
    if(p.key==='most'&&p.skill)s+=' · '+p.skill;
    if(!p.mind)s+=' · '+p.sense;
    if(i===practices.length-1&&p.open)s+=' · open-ended';
    return (practices.length>1?(i+1)+'. ':'')+s;
  }).join('    ');
  let rows='';
  for(let i=0;i<SEQ.length;i++)
    rows+='<div class="row" data-i="'+i+'"><span class="n">'+(i+1)+'</span><span class="b">'+SEQ[i]+'</span><span class="ph">'+(PH[i]||'')+'</span></div>';
  tl.innerHTML='<div class="hd"><span>test view · sequence</span><span>'+SEQ.length+' clips'+(LOOP?' · loops':'')+'</span></div><div class="plan">'+plan+'</div>'+rows;
}
function updateTest(){
  const tl=$('testlist');if(!tl)return;
  tl.querySelectorAll('.row').forEach(r=>{const i=+r.dataset.i;r.classList.toggle('cur',i===idx);r.classList.toggle('done',i<idx);});
  const cur=tl.querySelector('.row.cur');if(cur)cur.scrollIntoView({block:'nearest'});
}

$('begin').onclick=startPlayer;

function startPlayer(){
  const o=buildPlan();SEQ=o.seq;PH=o.phase;LOOP=o.loop;LOOPFROM=o.loopFrom;
  $('pause').textContent='Pause';$('pause').style.display='';
  finished=false;paused=false;playing=true;inGap=false;idx=-1;
  showScreen('player');fitRing();renderTest();showSil();
  cancelAnimationFrame(rafId);ringLoop();
  advance();
}
function stopAll(){playing=false;paused=false;inGap=false;clearTimeout(gapTimer);try{au.pause();}catch(e){}cancelAnimationFrame(rafId);}

function playCurrent(){
  const b=SEQ[idx];
  try{au.src=clipUrl(rand(MAN[b]));au.currentTime=0;const pr=au.play();if(pr&&pr.catch)pr.catch(()=>{});}catch(e){}
}
function advance(){
  if(!playing)return;
  idx++;
  if(idx>=SEQ.length){if(LOOP){idx=LOOPFROM;}else{return finish();}}
  inGap=false;
  playCurrent();updateTest();
}
au.onended=()=>{                                      // a clip finished playing, in full
  if(!playing||paused)return;
  if(!LOOP&&idx>=SEQ.length-1)return finish();         // last clip plays to its natural end — no cut
  gapRemain=gapAfter(SEQ[idx])*1000;gapStart=performance.now();inGap=true;
  clearTimeout(gapTimer);gapTimer=setTimeout(()=>{inGap=false;advance();},gapRemain);
};
au.onerror=()=>{                                      // a clip failed to load — skip on, don't freeze
  if(!playing||paused)return;
  if(!LOOP&&idx>=SEQ.length-1)return finish();
  inGap=true;gapRemain=300;gapStart=performance.now();
  clearTimeout(gapTimer);gapTimer=setTimeout(()=>{inGap=false;advance();},300);
};
function finish(){playing=false;finished=true;inGap=false;clearTimeout(gapTimer);try{au.pause();}catch(e){}
  $('pause').style.display='none';
}
$('pause').onclick=()=>{
  if(!playing)return;
  if(paused){ // resume
    paused=false;
    if(inGap){gapStart=performance.now();clearTimeout(gapTimer);gapTimer=setTimeout(()=>{inGap=false;advance();},gapRemain);}
    else{try{au.play();}catch(e){}}
    $('pause').textContent='Pause';
  }else{ // pause
    paused=true;
    if(inGap){clearTimeout(gapTimer);gapRemain=Math.max(0,gapRemain-(performance.now()-gapStart));}
    else{try{au.pause();}catch(e){}}
    $('pause').textContent='Resume';
  }
};
/* live silence control — adjusts the current practice's gap length on the fly */
const SILSTEPS=[2,4,6,8,10,12,16];
const nearestSil=v=>SILSTEPS.reduce((b,s)=>Math.abs(s-v)<Math.abs(b-v)?s:b,SILSTEPS[0]);
function showSil(){const e=$('silnow');if(e)e.textContent='silence: '+cfg.silence+'s';}
function stepSil(d){let i=SILSTEPS.indexOf(nearestSil(cfg.silence));i=Math.max(0,Math.min(SILSTEPS.length-1,i+d));cfg.silence=SILSTEPS[i];showSil();}
$('lesssil').onclick=()=>stepSil(-1);
$('moresil').onclick=()=>stepSil(1);

$('stopbtn').onclick=()=>{stopAll();finished=false;showScreen('setup');};   // immediate exit, no close
$('endbtn').onclick=()=>{
  if(finished){stopAll();showScreen('setup');return;}
  clearTimeout(gapTimer);inGap=false;playing=true;paused=false;LOOP=false;
  $('pause').textContent='Pause';
  const tail=['CLOSE-01','CLOSE-02','CLOSE-03','CLOSE-04','CLOSE-05','OUTRO'].filter(has);
  const played=SEQ.slice(0,Math.max(idx+1,0));
  SEQ=played.concat(tail);PH=PH.slice(0,played.length).concat(tail.map(()=>'closing'));
  idx=played.length-1;renderTest();
  try{au.pause();}catch(e){}
  advance();
};

/* ====== breathing ring (calm, brand-toned, reduced-motion aware) ====== */
const cv=$('ring'),g=cv.getContext('2d');
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
let rafId=null;
function fitRing(){const dpr=devicePixelRatio||1;const w=cv.clientWidth,h=cv.clientHeight;cv.width=w*dpr;cv.height=h*dpr;g.setTransform(dpr,0,0,dpr,0,0);}
addEventListener('resize',()=>{if(!$('player').classList.contains('hidden'))fitRing();});
function ringLoop(){
  rafId=requestAnimationFrame(ringLoop);
  const W=cv.clientWidth,H=cv.clientHeight,cx=W/2,cy=H/2;g.clearRect(0,0,W,H);
  const unit=Math.min(W,H);
  const t=performance.now()/1000;
  // ~9.6s breath cycle; frozen if reduced motion or paused
  const phase=(playing&&!paused&&!reduce)?(Math.sin(t*0.65)*0.5+0.5):0.5;
  const rSteady=unit*0.30;
  const rBreath=unit*0.17+phase*unit*0.16;
  // steady outer hairline ring
  g.strokeStyle='#D8D2C2';g.lineWidth=1.5;g.beginPath();g.arc(cx,cy,rSteady,0,Math.PI*2);g.stroke();
  // breathing ink ring
  g.strokeStyle='#1A1F2A';g.globalAlpha=0.55;g.lineWidth=2;g.beginPath();g.arc(cx,cy,rBreath,0,Math.PI*2);g.stroke();g.globalAlpha=1;
  // center mark
  g.fillStyle='#5E5A4E';g.beginPath();g.arc(cx,cy,2.5,0,Math.PI*2);g.fill();
}

renderSetup();
